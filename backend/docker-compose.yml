services:
  mysql:
    image: mysql:8.4
    container_name: sitiket-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-sitiket}
      MYSQL_USER: ${DB_USER:-sitiket}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sitiket_dev_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-sitiket_root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - sitiket_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${DB_ROOT_PASSWORD:-sitiket_root_password}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sitiket_mysql_data:
